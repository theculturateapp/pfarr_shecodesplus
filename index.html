<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="src/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <title>Porsche App</title>
</head>
<body>
  <div class="weather-app">
    <header>
      <form class="search-form" id="search-form">
        <input 
          type="search" 
          placeholder="Enter a City.."
          required 
          id="search-form-input"
          class="search-form-input" />
        <input type="submit" value="Search" class="search-form-button" />
      </form>
    </header>
   <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city" id="city">Atlanta</h1>
            <p class="weather-app-details">
              <span id="time">14:00</span>,
              <span id="description">Clear Skies</span>
              <br />
              Humidity: <strong id="humidity">20%</strong>, Wind: 
              <strong id="wind-speed">5km/hr</strong>
            </p>
          </div>
          <div class="weather-app-temperature-container">
            <div id="icon"></div>
            <div class="weather-app-temperature" id="temperature">50</div>
            <div class="weatehr-app-unit">°F</div>
          </div>
        </div>
      </main>
  <footer>Coded By 
    <a href="https://github.com/theculturateapp/" target="_blank">Porsche</a> 
    Hosted on <a href="https://github.com/" target="_blank">Github</a> 
    Website hosted on <a href="https://week7pf.netlify.app/" target="_blank">Netlify</a></footer>
</div>
<script src="src/index.js"></script>
</body>
</html>
