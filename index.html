<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="src/style.css" />
  <title>Porsche App</title>
</head>
<body>
  <div class="weather-app">
    <header>
      <form class="search-form" id="search-form">
        <input 
          type="search" 
          placeholder="Enter a City.."
          required 
          id="search-form-input"
          class="search-form-input" />
        <input type="submit" value="Search" class="search-form-button" />
      </form>
    </header>
  <main>
    <div class="weather-app-data">
    <h1 class="weather-app-city" id="city">Atlanta</h1>
    <p class="weather-app-dtails"> Tuesday 14:00, scattered clouds
      <br />
      Humidity: <strong>66%</strong>, Wind: <strong>3.12m/h</strong>
    </p>
    </div>
    <div class="weather-app-temperature-container">
      <div class="weather-app-icon">☀️</div><div class="weather-app-temperature">12</div><div class="weather-app-unit">°F</div>
    </div>
  </main>
  <footer>Coded By 
    <a href="https://github.com/theculturateapp/" target="_blank">Porsche</a> 
    Hosted on <a href="https://github.com/" target="_blank">Github</a> 
    Website hosted on <a href="https://week7pf.netlify.app/" target="_blank">Netlify</a></footer>
</div>
<script src="src/index.js"></script>
</body>
</html>
